name: deep-interview
version: "1.0.0"
pool: stable

trigger:
  task_types:
    - "*"
  uncertainty:
    - high
  blast_radius:
    - "*"
  verifiability:
    - easy
    - moderate
    - hard
  latency_sensitivity: any
  domains:
    - "*"
  notes: "Selected when the task description is ambiguous, requirements are unclear, or success criteria are undefined. Conducts a structured clarification interview before executing."

workflow:
  - "Analyze the task for ambiguity: identify unclear requirements, missing context, and undefined acceptance criteria"
  - "Generate a focused list of clarifying questions (max 5) ordered by impact"
  - "Ask questions one batch at a time — wait for user response before proceeding"
  - "Build a full specification from the answers: goals, constraints, acceptance criteria, out-of-scope items"
  - "Decompose the spec into ordered implementation tasks"
  - "Execute each task, cross-checking against the spec at each step"
  - "Verify the final output satisfies every acceptance criterion in the spec"
  - "Present a completion summary citing spec coverage"

tool_policy:
  allowed:
    - Read
    - Write
    - Edit
    - Bash
    - Grep
    - Glob
  denied:
    - WebFetch
    - WebSearch
  restrictions:
    - "Never execute tasks before the spec is confirmed by the user"
    - "Never fabricate answers to clarifying questions"

stopping_criteria:
  - condition: spec_confirmed
    description: "User has confirmed the specification and acceptance criteria"
  - condition: all_acceptance_criteria_met
    description: "Every acceptance criterion in the confirmed spec is satisfied"

verification_steps:
  - "Spec exists with explicit acceptance criteria confirmed by user"
  - "Each acceptance criterion has been verified against the output"
  - "No requirements left unimplemented without explicit user approval"

cost_budget:
  max_tokens: 600000
  max_time_minutes: 60
  max_parallel_agents: 1

failure_modes:
  - condition: "user_unresponsive"
    description: "User does not answer clarifying questions after 2 prompts"
    action: escalate_to_user
  - condition: "spec_contradiction"
    description: "User answers create contradictory requirements"
    action: escalate_to_user
  - condition: "max_iterations_exceeded"
    description: "Execution exceeds 15 cycles without satisfying all acceptance criteria"
    action: fallback
    fallback_harness: ralplan-consensus
