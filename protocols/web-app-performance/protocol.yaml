name: web-app-performance
version: "1.0.0"
description: >
  Evaluation protocol for web application development tasks. Extends standard
  quality dimensions with web-specific metrics: response time, UI consistency,
  accessibility, and Lighthouse score. Universal dimensions are re-weighted to
  accommodate the four custom dimensions (total weight = 1.0). Use this protocol
  when the task involves frontend components, API endpoints, or full-stack web
  features where user-facing performance and UX quality are primary concerns.

universal_dimensions:
  - name: build_success
    weight: 0.05
    type: binary
    description: >
      Application builds without errors: frontend bundle compiles, backend starts
      without crash, all imports resolve. Evidence: build command (npm run build,
      webpack, vite, etc.) exits with code 0. TypeScript type errors count as
      build failure if tsc is part of the build.

  - name: test_pass_rate
    weight: 0.10
    type: percentage
    description: >
      Percentage of tests passing: unit tests for components/utilities, integration
      tests for API endpoints, E2E tests if present. In web context, includes
      both frontend (Jest/Vitest/Testing Library) and backend test suites.

  - name: code_quality
    weight: 0.05
    type: score_0_to_1
    description: >
      Structural quality of web code. Evaluator checks: component responsibilities
      are clearly scoped, API handlers are thin (business logic in services),
      no inline styles that should be CSS classes, consistent use of async/await
      vs. Promise chains. Frontend and backend code quality assessed separately.

  - name: robustness
    weight: 0.05
    type: score_0_to_1
    description: >
      How well the application handles failure modes: network errors, empty states,
      loading states, invalid input, session expiry, and partial data. Frontend
      must not crash on null props. API must not return 500 for invalid client input.

  - name: maintainability
    weight: 0.05
    type: score_0_to_1
    description: >
      Ease of future modification: components are reusable and composable, CSS is
      organized (not scattered inline), API routes follow a consistent pattern,
      environment configuration is externalised (not hardcoded URLs/keys).

  - name: security
    weight: 0.05
    type: score_0_to_1
    description: >
      Web-specific security: CSRF protection on state-changing endpoints, XSS
      prevention (no dangerouslySetInnerHTML with unsanitized input), authentication
      checks on protected routes, no sensitive data in client-side storage.
      SQL injection prevention for database-touching endpoints.

  - name: readability
    weight: 0.05
    type: score_0_to_1
    description: >
      Web code readability: meaningful component names, clear prop types/interfaces,
      CSS class names communicate their purpose (BEM, CSS modules, or Tailwind used
      consistently), API route names follow RESTful conventions.

  - name: error_handling
    weight: 0.05
    type: score_0_to_1
    description: >
      Web error handling: API returns correct HTTP status codes (400 for validation,
      401/403 for auth, 404 for not found, 500 only for unexpected errors),
      frontend shows meaningful error messages to users (not raw server errors),
      form validation errors are displayed inline near the relevant field.

custom_dimensions:
  - name: response_time
    weight: 0.20
    type: score_0_to_1
    description: >
      API response time and page load performance. Evaluator assesses based on
      evidence: API endpoints responding under 200ms for simple reads (score 1.0),
      under 500ms (score 0.7), under 1000ms (score 0.4), over 1000ms (score 0.1).
      For pages: First Contentful Paint under 1.5s (score 1.0). Evaluator also
      checks for obvious performance anti-patterns: synchronous blocking operations,
      N+1 database queries, unoptimized images, missing lazy loading.
      If no measurement is available, evaluator scores based on code analysis.

  - name: ui_consistency
    weight: 0.15
    type: score_0_to_1
    description: >
      Visual and interaction consistency of the implemented UI. Evaluator checks:
      new components use the same design tokens (colors, spacing, typography) as
      existing components, interactive states (hover, focus, active, disabled) are
      implemented for all interactive elements, layout behavior is consistent with
      existing pages, error and loading states follow established patterns.
      Score 1.0 = indistinguishable from existing UI. Score 0.5 = mostly consistent
      with minor deviations. Score 0.0 = visually inconsistent.

  - name: accessibility
    weight: 0.10
    type: score_0_to_1
    description: >
      WCAG 2.1 AA compliance for implemented UI components. Evaluator checks:
      all images have descriptive alt text, form inputs have associated labels,
      interactive elements are keyboard navigable, color contrast meets AA ratio
      (4.5:1 for normal text), focus indicators are visible, ARIA attributes are
      used correctly (not overused). Score 1.0 = no violations found. Score 0.5 =
      minor violations (missing alt text on decorative images). Score 0.0 = major
      violations (no keyboard navigation, no labels on form inputs).

  - name: lighthouse_score
    weight: 0.10
    type: score_0_to_1
    description: >
      Google Lighthouse composite score (Performance + Accessibility + Best Practices
      + SEO average). If Lighthouse is available in the project, evidence from
      a Lighthouse run is used directly. If not available, evaluator estimates
      based on code analysis: presence of meta tags, image optimization, script
      loading strategy, Core Web Vitals considerations. Score maps directly from
      Lighthouse 0–100 to 0–1 (e.g., Lighthouse 85 = score 0.85).

quality_gates:
  hooks:
    role: early_warning
    checks:
      - "Build command exits with code 0"
      - "Development server starts without error"
      - "No console errors on primary page load"

  scripts:
    role: evidence_collection
    checks:
      - "Build output size (bundle size for frontend)"
      - "Test suite pass/fail counts"
      - "API response time measurements (if benchmark available)"
      - "Lighthouse score (if CLI tool available: lighthouse --output=json)"
      - "Accessibility audit output (if axe-core or similar is available)"

  evaluator:
    role: final_authority
    model: claude-opus-4-6
