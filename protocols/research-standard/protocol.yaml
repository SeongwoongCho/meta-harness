name: research-standard
version: "1.0.0"
description: >
  Evaluation protocol for general research and analysis tasks that do not involve
  ML model training. Covers codebase analysis, architecture research, technology
  evaluation, performance investigation, and exploratory tasks. Unlike ml-research,
  this protocol does not assume model training is involved. Unlike code-quality-standard,
  this protocol weights analytical rigor and methodology over build/test metrics.
  Use this protocol when task_type is "research" and domain is NOT "ml-research".

universal_dimensions:
  - name: build_success
    weight: 0.05
    type: binary
    description: >
      If code was modified, it still builds. For pure analysis tasks with no code
      changes, auto-score 1.0. Evidence: build command exit code if present.

  - name: test_pass_rate
    weight: 0.05
    type: percentage
    description: >
      If tests exist and code was modified, they still pass. For pure analysis
      with no code changes, auto-score 1.0. Reduced weight because research
      tasks often produce analysis artifacts rather than code changes.

  - name: code_quality
    weight: 0.05
    type: score_0_to_1
    description: >
      Quality of any code written (scripts, benchmarks, prototypes). If no code
      was produced, score based on quality of structured output (markdown, YAML).

  - name: robustness
    weight: 0.03
    type: score_0_to_1
    description: >
      For research: are conclusions robust to alternative interpretations? Are
      edge cases in the analysis acknowledged? For code: standard robustness.

  - name: maintainability
    weight: 0.02
    type: score_0_to_1
    description: >
      Are research artifacts organized and maintainable? Can someone else
      follow the analysis and extend it? Low weight for pure research tasks.

  - name: security
    weight: 0.02
    type: score_0_to_1
    description: >
      No sensitive data exposed in research artifacts. Defaults to 1.0 for
      most research tasks unless external systems are involved.

  - name: readability
    weight: 0.08
    type: score_0_to_1
    description: >
      Clarity of the research output. Are findings communicated clearly?
      Is the reasoning easy to follow? Are technical terms defined when needed?

  - name: error_handling
    weight: 0.02
    type: score_0_to_1
    description: >
      For code artifacts: standard error handling. For analysis: are limitations
      and potential errors in methodology acknowledged?

custom_dimensions:
  - name: analysis_depth
    weight: 0.25
    type: score_0_to_1
    description: >
      Thoroughness of the research and analysis. Evaluator assesses:
      - Are multiple perspectives and approaches considered?
      - Are claims supported by concrete evidence (code readings, measurements, data)?
      - Are edge cases, counterarguments, and limitations addressed?
      - Is the analysis deeper than surface-level observation?
      Score 1.0 = comprehensive, multi-layered analysis with evidence.
      Score 0.7 = good depth on main points, some gaps.
      Score 0.5 = surface-level but correct observations.
      Score 0.0 = superficial or unsupported claims.

  - name: methodology_rigor
    weight: 0.20
    type: score_0_to_1
    description: >
      Soundness and systematicness of the research approach. Evaluator assesses:
      - Is the approach systematic (not ad-hoc wandering)?
      - Are variables isolated when comparing alternatives?
      - Are conclusions justified by the evidence gathered?
      - Is the methodology reproducible (another researcher could follow the steps)?
      Score 1.0 = rigorous, systematic, reproducible method.
      Score 0.7 = reasonable methodology with minor gaps.
      Score 0.5 = informal but defensible approach.
      Score 0.0 = conclusions not supported by evidence.

  - name: actionability
    weight: 0.15
    type: score_0_to_1
    description: >
      How actionable are the research findings? Evaluator assesses:
      - Are recommendations concrete and specific (not vague)?
      - Is there a clear priority ordering of next steps?
      - Can someone act on the findings without further research?
      - Are tradeoffs between options clearly articulated?
      Score 1.0 = immediately actionable with clear priorities.
      Score 0.7 = actionable with some ambiguity.
      Score 0.5 = informative but requires further work to act on.
      Score 0.0 = no actionable conclusions.

  - name: completeness
    weight: 0.08
    type: score_0_to_1
    description: >
      Coverage of the research scope. Were all aspects of the question addressed?
      Are there obvious gaps or areas left unexplored without justification?
      Score 1.0 = all aspects covered, scope fully addressed.
      Score 0.5 = major aspects covered, some gaps acknowledged.
      Score 0.0 = significant scope left unaddressed.

quality_gates:
  hooks:
    role: early_warning
    checks:
      - "Research output contains structured findings"
      - "If code was executed, commands completed without error"
      - "Evidence of codebase exploration (file reads, searches)"

  scripts:
    role: evidence_collection
    checks:
      - "Number of files read during analysis"
      - "Number of search queries executed"
      - "Structured output produced (sections, findings, recommendations)"
      - "Build/test commands if code was modified"

  evaluator:
    role: final_authority
    model: auto
