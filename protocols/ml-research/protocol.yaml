name: ml-research
version: "1.0.0"
description: >
  Evaluation protocol for machine learning research and experimentation tasks.
  Extends the standard quality dimensions with ML-specific metrics: model accuracy,
  training efficiency, reproducibility, and experiment tracking. Universal dimensions
  are re-weighted to accommodate the four custom dimensions (total weight = 1.0).
  Use this protocol when the task involves training, fine-tuning, benchmarking,
  or evaluating ML models.

universal_dimensions:
  - name: build_success
    weight: 0.05
    type: binary
    description: >
      Training/inference code runs without crashes. Evidence: script exits with code 0
      or reaches the intended stopping condition (epoch limit, convergence).
      Reduced weight vs. standard because ML research tolerates exploratory failures
      more than production code.

  - name: test_pass_rate
    weight: 0.05
    type: percentage
    description: >
      Percentage of unit/integration tests passing. In ML context, this includes
      data pipeline tests, shape assertion tests, and preprocessing unit tests.
      Reduced weight because the primary quality signal is empirical model performance.

  - name: code_quality
    weight: 0.05
    type: score_0_to_1
    description: >
      Structural quality of research code. Evaluator assesses: clear separation of
      data loading, model definition, training loop, and evaluation; no hardcoded
      magic numbers for hyperparameters (they should be config variables);
      readable experiment scripts. Research code standard is lower than production
      but must be readable by collaborators.

  - name: robustness
    weight: 0.05
    type: score_0_to_1
    description: >
      Handling of common ML failure modes: missing data, NaN gradients, OOM conditions,
      checkpoint save/load errors, dataset path issues. At minimum, training should
      not silently produce incorrect results (NaN loss, all-same predictions).

  - name: maintainability
    weight: 0.03
    type: score_0_to_1
    description: >
      How easily the experiment code can be modified and re-run by others.
      Config-driven hyperparameters, clear data pipeline, modular model components.

  - name: security
    weight: 0.02
    type: score_0_to_1
    description: >
      No hardcoded credentials for data sources (S3, GCS, databases). Safe handling
      of model weights and data (no accidental public exposure). Defaults to 1.0
      if no external data sources or model registry are involved.

  - name: readability
    weight: 0.05
    type: score_0_to_1
    description: >
      Experiment code is readable: meaningful variable names (not single letters
      except conventional ML notation like X, y, W), documented model architecture,
      clear training loop with logged metrics.

  - name: error_handling
    weight: 0.05
    type: score_0_to_1
    description: >
      Training does not silently fail: loss NaN is detected and reported, data
      loading errors are surfaced, checkpoint saves are verified. Evaluation
      errors (division by zero in metrics) are handled gracefully.

custom_dimensions:
  - name: model_accuracy
    weight: 0.25
    type: score_0_to_1
    description: >
      Primary model performance metric relative to baseline and stated goal.
      Evaluator maps the task's specific metric (accuracy, F1, BLEU, perplexity,
      etc.) to a 0–1 score: 1.0 = meets or exceeds the research goal,
      0.5 = meaningful improvement over baseline but goal not fully met,
      0.0 = no improvement over baseline or regression.
      Requires: baseline measurement documented, goal stated, final metric reported.

  - name: training_efficiency
    weight: 0.15
    type: score_0_to_1
    description: >
      How efficiently the model reaches its performance level in terms of compute
      and time. Evaluator considers: training time vs. accuracy tradeoff compared
      to baseline approach, memory usage, whether obvious inefficiencies exist
      (e.g., recomputing features every epoch instead of caching). Score 1.0 =
      efficient use of resources. Score 0.5 = acceptable but with known waste.
      Score 0.0 = obviously inefficient with simple fixes available.

  - name: reproducibility
    weight: 0.15
    type: score_0_to_1
    description: >
      Can the experiment be re-run to get the same (or statistically equivalent)
      results? Evaluator checks: random seeds are fixed and documented, data splits
      are deterministic or saved, all hyperparameters are in config (not hardcoded),
      environment dependencies are documented (requirements.txt, conda env, or
      equivalent). Score 1.0 = fully reproducible. Score 0.5 = partially (seed set
      but data split not saved). Score 0.0 = not reproducible.

  - name: experiment_tracking
    weight: 0.10
    type: score_0_to_1
    description: >
      Quality of experiment logging and tracking. Evaluator checks: key metrics
      are logged per epoch/step (loss, primary metric, learning rate), training
      curves are saved or visualizable, experiment config is persisted alongside
      results, runs are distinguishable (named or timestamped). Integration with
      a tracking tool (MLflow, W&B, TensorBoard, or even structured log files)
      earns full credit. Ad-hoc print statements with no persistence score 0.2.

quality_gates:
  hooks:
    role: early_warning
    checks:
      - "Training script exits without error"
      - "Loss value is not NaN at end of training"
      - "Final metric value is present in output"

  scripts:
    role: evidence_collection
    checks:
      - "Training loss curve (final value vs. initial value)"
      - "Primary metric value on validation/test set"
      - "Baseline metric value for comparison"
      - "Training duration and peak memory usage"
      - "Random seed value and data split method"

  evaluator:
    role: final_authority
    model: claude-opus-4-6
