name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version to release (e.g. 1.2.0)"
        required: true
        type: string

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate semver input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: '${VERSION}' is not valid semver (expected X.Y.Z)"
            exit 1
          fi
          echo "Version validated: ${VERSION}"

      - name: Bump version files
        run: |
          python3 scripts/bump_version.py "${{ github.event.inputs.version }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json CLAUDE.md
          git commit -m "chore: bump version to ${VERSION}"

      - name: Find previous tag for changelog
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"
          echo "Previous tag: ${PREV_TAG:-none}"

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.tag }}"
          if [ -n "${PREV_TAG}" ]; then
            NOTES=$(python3 scripts/generate_changelog.py "${PREV_TAG}" HEAD)
          else
            NOTES=$(python3 scripts/generate_changelog.py)
          fi
          echo "${NOTES}" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Push dev branch with version bump
        run: |
          git push origin dev

      - name: Create Pull Request to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const version = '${{ github.event.inputs.version }}';
            const notes = fs.readFileSync('/tmp/release_notes.md', 'utf8');

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: release v${version}`,
              head: 'dev',
              base: 'main',
              body: `## Release v${version}\n\n${notes}\n\n---\n_Auto-generated by prepare-release workflow._`,
              draft: false,
            });

            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`);
            core.summary.addLink(`Pull Request #${pr.data.number}`, pr.data.html_url);
