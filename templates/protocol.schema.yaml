# Evaluation Protocol Schema — defines how results are scored
# Protocols are independent from harnesses (same harness, different protocol per domain).

evaluation_protocol:
  type: object
  required: [name, version, description, universal_dimensions]
  properties:
    name:
      type: string
      description: "Unique protocol identifier"

    version:
      type: string
      pattern: "^\\d+\\.\\d+\\.\\d+$"

    description:
      type: string

    universal_dimensions:
      type: array
      items:
        type: object
        required: [name, weight, type]
        properties:
          name:
            type: string
            description: "Dimension name (e.g., build_success, test_pass_rate)"
          weight:
            type: number
            minimum: 0
            maximum: 1
            description: "Weight in overall score (all weights should sum to ~1.0)"
          type:
            type: string
            enum: [binary, percentage, score_0_to_1]
            description: "How this dimension is measured"
          description:
            type: string
      description: "Standard dimensions applied to every evaluation"

    custom_dimensions:
      type: array
      items:
        type: object
        required: [name, weight, type]
        properties:
          name:
            type: string
          weight:
            type: number
          type:
            type: string
            enum: [binary, percentage, score_0_to_1, numeric]
          description:
            type: string
      description: "Domain-specific dimensions added via meta-harness-init"

    quality_gates:
      type: object
      description: "3-layer quality gate configuration"
      properties:
        hooks:
          type: object
          properties:
            role:
              type: string
              enum: [early_warning]
            checks:
              type: array
              items:
                type: string
        scripts:
          type: object
          properties:
            role:
              type: string
              enum: [evidence_collection]
            checks:
              type: array
              items:
                type: string
        evaluator:
          type: object
          properties:
            role:
              type: string
              enum: [final_authority]
            model:
              type: string
              description: "Model to use for evaluation (default: opus)"
