name: universal-standard
version: "1.0.0"
description: >
  Task-agnostic evaluation protocol that applies to any kind of work: code tasks,
  research, planning, writing, refactoring, documentation, or analysis. Rather than
  measuring code-specific signals (build success, test pass rate), this protocol
  measures the fundamental quality axes that determine whether any output is good.
  Use this as the default protocol when no specialized protocol is needed.

universal_dimensions:
  - name: correctness
    weight: 0.25
    type: score_0_to_1
    description: >
      Does the output satisfy the stated requirements? For code: logic is correct,
      requirements are implemented as specified, no regressions introduced. For
      research/analysis: conclusions are factually accurate and logically sound.
      For planning: the plan addresses the actual problem, not a misunderstood one.
      For documentation: information is accurate and up-to-date.
      Score 1.0 = all requirements met with no errors. Score 0.7 = most requirements
      met with minor gaps. Score 0.4 = partially correct, significant gaps. Score 0.0
      = output is incorrect or fails to address the stated task.

  - name: completeness
    weight: 0.20
    type: score_0_to_1
    description: >
      Does the output cover the full scope of the task? For code: all requested
      features/fixes are implemented, nothing left TODO without justification. For
      research: all aspects of the question are addressed. For planning: all phases
      and dependencies are accounted for. For documentation: no significant gaps
      in coverage.
      Score 1.0 = full scope addressed. Score 0.7 = most scope covered, minor gaps
      acknowledged. Score 0.4 = significant portions of scope left unaddressed.
      Score 0.0 = task is barely started or major scope missing.

  - name: quality
    weight: 0.20
    type: score_0_to_1
    description: >
      Structural and stylistic quality of the output. For code: clean structure,
      appropriate naming, no unnecessary complexity, follows established patterns.
      For research/analysis: well-organized findings, claims backed by evidence,
      logical flow. For writing/documentation: clear prose, appropriate detail level,
      consistent style. For planning: concrete and actionable steps, well-reasoned
      tradeoffs.
      Score 1.0 = exemplary quality for the output type. Score 0.7 = good quality
      with minor issues. Score 0.4 = acceptable but has notable quality problems.
      Score 0.0 = unacceptable quality.

  - name: robustness
    weight: 0.10
    type: score_0_to_1
    description: >
      How well the output handles edge cases, failure modes, and adversarial
      conditions. For code: error handling, boundary conditions, graceful degradation.
      For research/analysis: counterarguments addressed, limitations acknowledged,
      conclusions do not over-generalize. For planning: risks identified, contingencies
      considered. For documentation: unusual cases and exceptions documented.
      Score 1.0 = comprehensive coverage of edge cases and failure modes. Score 0.7
      = primary failure modes handled. Score 0.4 = some coverage, significant gaps.
      Score 0.0 = no consideration of failure or edge cases.

  - name: clarity
    weight: 0.15
    type: score_0_to_1
    description: >
      How clearly the output communicates its intent and reasoning. For code: readable
      code, meaningful names, inline comments for non-obvious logic. For research:
      findings expressed concisely, conclusions stated directly, no ambiguity. For
      planning: steps are unambiguous, responsibilities clear. For documentation:
      easy to understand for the target audience without guesswork.
      Score 1.0 = immediately clear to the target reader. Score 0.7 = generally
      clear with some ambiguous sections. Score 0.4 = requires significant interpretation.
      Score 0.0 = unclear, confusing, or contradictory.

  - name: verifiability
    weight: 0.10
    type: score_0_to_1
    description: >
      Can the output be independently verified? For code: tests exist or behavior
      can be observed directly. For research: evidence cited, methodology reproducible,
      data sources referenced. For planning: success criteria defined, milestones
      measurable. For documentation: examples provided, instructions testable.
      Score 1.0 = fully verifiable with clear evidence or acceptance criteria.
      Score 0.7 = mostly verifiable, some claims require trust. Score 0.4 = limited
      verifiability, key claims unsubstantiated. Score 0.0 = no way to verify
      correctness of the output.

quality_gates:
  hooks:
    role: early_warning
    checks:
      - "Output was produced (no empty result)"
      - "Task description was understood (output addresses the actual request)"
      - "If Bash commands were used, no unexpected errors in exit codes"

  scripts:
    role: evidence_collection
    checks:
      - "Artifact produced (files written, commands run, analysis delivered)"
      - "Build/test commands if code was modified"
      - "File reads and searches if analysis task"
      - "Structured output produced (sections, findings, recommendations) if research task"

  evaluator:
    role: final_authority
    model: auto
