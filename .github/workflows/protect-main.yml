name: Protect Main Branch

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR comes from dev branch
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "::error::PRs to main must come from the dev branch, not '${{ github.head_ref }}'"
            echo "Workflow: feature-branch → dev (via PR) → main (via PR from dev only)"
            exit 1
          fi
          echo "Source branch is dev — allowed."
