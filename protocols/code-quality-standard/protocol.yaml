name: code-quality-standard
version: "1.0.0"
description: >
  Standard evaluation protocol for general software development tasks.
  Covers the full spectrum of code quality concerns: correctness (build + tests),
  structural quality, robustness, security, and readability. Applies to any
  task type across all domains. Used as the default protocol when no
  domain-specific protocol is configured.

universal_dimensions:
  - name: build_success
    weight: 0.20
    type: binary
    description: >
      The codebase builds without errors after the task is complete.
      Evidence: build command exit code is 0. Any compilation error,
      missing import, or syntax error counts as failure.

  - name: test_pass_rate
    weight: 0.20
    type: percentage
    description: >
      Percentage of tests in the full test suite that pass after the task.
      Evidence: test runner output (e.g., "42/45 passed" = 0.933).
      New test failures introduced by this task count against the score.
      Pre-existing failures are noted but do not count against this task.

  - name: code_quality
    weight: 0.15
    type: score_0_to_1
    description: >
      Structural quality of the code written or modified. Evaluator assesses:
      single responsibility adherence, absence of duplication, appropriate
      function/variable naming, reasonable function length (< 50 lines preferred),
      and no unnecessary complexity. Score 1.0 = exemplary. Score 0.5 = acceptable
      with known issues. Score 0.0 = major structural problems.

  - name: robustness
    weight: 0.10
    type: score_0_to_1
    description: >
      How well the code handles error conditions, edge cases, and unexpected inputs.
      Evaluator checks: null/undefined handling, boundary conditions, error paths
      that don't crash, and graceful degradation. Partial credit for handling
      primary error paths even if all edge cases aren't covered.

  - name: maintainability
    weight: 0.10
    type: score_0_to_1
    description: >
      How easy the code will be to change and extend in the future.
      Evaluator assesses: coupling (are dependencies minimal and explicit?),
      extensibility (can new behaviors be added without modifying existing code?),
      consistency with established codebase patterns, and absence of magic values.

  - name: security
    weight: 0.10
    type: score_0_to_1
    description: >
      Absence of security vulnerabilities in modified code. Evaluator checks:
      no hardcoded secrets, input validation on user-supplied data, no obvious
      injection vulnerabilities, safe use of cryptographic primitives.
      Score 1.0 = no issues found. Score 0.0 = critical vulnerability present.
      If the task is not security-sensitive, score defaults to 1.0.

  - name: readability
    weight: 0.10
    type: score_0_to_1
    description: >
      How clearly the code communicates its intent to a human reader.
      Evaluator checks: meaningful names (variables, functions, tests),
      absence of cryptic abbreviations, inline comments for non-obvious logic,
      logical organization of code within files. Score 1.0 = reads like prose.

  - name: error_handling
    weight: 0.05
    type: score_0_to_1
    description: >
      Quality of error handling in the changed code. Evaluator checks:
      errors are caught at the right level (not swallowed silently), error
      messages communicate what went wrong and where, exceptions are not
      caught too broadly (bare except / catch-all). Lower weight because
      it overlaps with robustness — this focuses on the handling mechanism
      rather than the coverage of error conditions.

task_type_overrides:
  research:
    description: >
      For research/analysis tasks, build and test dimensions are less relevant.
      Analysis depth and methodology rigor replace them as primary signals.
    dimension_weights:
      build_success: 0.05
      test_pass_rate: 0.05
      code_quality: 0.15
      robustness: 0.05
      maintainability: 0.10
      security: 0.05
      readability: 0.15
      error_handling: 0.05
    added_dimensions:
      - name: analysis_depth
        weight: 0.20
        type: score_0_to_1
        description: >
          Depth and thoroughness of the analysis. Evaluator assesses: are multiple
          perspectives considered? Are claims supported by evidence (code readings,
          measurements, references)? Are edge cases and counterarguments addressed?
          Score 1.0 = comprehensive, evidence-based analysis. Score 0.5 = surface-level.
      - name: methodology_rigor
        weight: 0.15
        type: score_0_to_1
        description: >
          Soundness of the research methodology. Evaluator assesses: is the approach
          systematic (not ad-hoc)? Are variables isolated? Are conclusions justified
          by the evidence? Score 1.0 = rigorous scientific method. Score 0.5 = reasonable
          but informal. Score 0.0 = conclusions not supported by evidence.

  refactor:
    description: >
      For refactoring tasks, behavior preservation and structural improvement are paramount.
      Security weight is reduced (refactors rarely introduce new security surfaces).
    dimension_weights:
      build_success: 0.25
      test_pass_rate: 0.25
      code_quality: 0.20
      robustness: 0.05
      maintainability: 0.15
      security: 0.02
      readability: 0.05
      error_handling: 0.03

  migration:
    description: >
      For migration tasks, build success and test pass rate are critical (nothing should break).
      Rollback safety is an additional concern.
    dimension_weights:
      build_success: 0.25
      test_pass_rate: 0.25
      code_quality: 0.10
      robustness: 0.15
      maintainability: 0.10
      security: 0.10
      readability: 0.02
      error_handling: 0.03

  benchmark:
    description: >
      For benchmark tasks, measurement methodology and reproducibility matter most.
    dimension_weights:
      build_success: 0.10
      test_pass_rate: 0.10
      code_quality: 0.10
      robustness: 0.05
      maintainability: 0.05
      security: 0.05
      readability: 0.10
      error_handling: 0.05
    added_dimensions:
      - name: measurement_rigor
        weight: 0.25
        type: score_0_to_1
        description: >
          Quality of benchmark methodology. Multiple runs, variance reported,
          controlled environment, no confounding variables. Score 1.0 = publication-ready.
      - name: reproducibility
        weight: 0.15
        type: score_0_to_1
        description: >
          Can the benchmark be re-run to get equivalent results? Fixed seeds,
          documented environment, deterministic setup.

quality_gates:
  hooks:
    role: early_warning
    checks:
      - "Bash tool output contains test runner results"
      - "Bash tool output contains build command result"
      - "No error pattern detected in evidence (exit code != 0)"

  scripts:
    role: evidence_collection
    checks:
      - "Build command exit code and output"
      - "Test runner pass/fail counts and names of failing tests"
      - "Coverage percentage for modified modules (if coverage tool available)"
      - "Lint/static analysis output (if tool available)"

  evaluator:
    role: final_authority
    model: auto
